default_stages: [pre-commit, pre-push]
default_install_hook_types: [commit-msg, pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: pretty-format-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: check-toml
      - id: name-tests-test
        args: [--pytest-test-first]
        exclude: test_package/utils\.py

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.11
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi]
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.6.2
        files: \.(json|md|yaml|yml)$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        pass_filenames: false
        args: ["-r", "mdfluence/"]

  - repo: https://github.com/google/osv-scanner
    rev: v2.3.5
    hooks:
      - id: osv-scanner
        files: uv\.lock

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: ty
        name: ty - Astral type checker
        entry: uv run --locked --group dev ty check mdfluence
        language: system
        types: [python]
        pass_filenames: false
      - id: tox
        name: tox
        entry: uv run --locked --group dev tox -e py312
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]
